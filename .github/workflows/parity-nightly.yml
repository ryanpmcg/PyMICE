name: Parity (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: parity-nightly
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  parity:
    name: R chain parity + vignette alignment
    # Draw-order goldens are generated on Windows (see golden _provenance); Linux BLAS
    # yields different mammalsleep logged-event counts and pool tables.
    runs-on: windows-latest
    env:
      # Single-thread BLAS: multi-thread GEMM can flip remove_lindep / logged-event paths.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install CRAN mice + pan
        run: Rscript -e 'install.packages(c("mice", "pan"), repos="https://cloud.r-project.org")'

      - name: Install PyMICE
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev,plot,pandas,ml,survival]" numpy==2.5.1 scipy==1.18.0

      - name: Structural alignment
        run: python -m pytest tests/parity/test_structural_alignment.py -q --rootdir="${{ github.workspace }}"

      - name: remove_lindep R parity
        run: python -m pytest tests/unit/test_remove_lindep_r_parity.py -q --rootdir="${{ github.workspace }}"

      - name: V03 mammalsleep chain parity
        run: python -m pytest tests/vignettes/test_v03_mammalsleep_parity.py -q --rootdir="${{ github.workspace }}"

      - name: RNG chain parity (V01–V05)
        run: python -m pytest tests/parity/test_rng_parity.py -q --rootdir="${{ github.workspace }}"

      - name: Full maintain_parity audit
        run: python devtools/maintain_parity.py
