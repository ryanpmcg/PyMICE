name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          
      - name: Run Ruff Format Check
        run: ruff format --check .
        
      - name: Run Ruff Linter
        run: ruff check .

  test:
    name: Run Tests (${{ matrix.os }} - Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Package & Dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e .[dev,plot,pandas,ml]
          
      - name: Run Pytest
        run: pytest
        
      - name: GPL Contamination Check (UNIX only)
        if: runner.os != 'Windows'
        run: |
          if grep -r "GPL" src/pymice/ 2>/dev/null; then
            echo "Unexpected GPL references in src/"
            exit 1
          fi