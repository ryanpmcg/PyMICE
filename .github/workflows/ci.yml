# CI/CD for public repo github.com/ryanpmcg/PyMICE
# Docs site: https://ryanpmcg.github.io/PyMICE/
name: CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "reference/**"
      - "devtools/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/parity-nightly.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "reference/**"
      - "devtools/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/parity-nightly.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint & policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: GPL contamination check
        run: |
          if grep -r "GPL" src/pymice/ 2>/dev/null; then
            echo "Unexpected GPL references in src/pymice/"
            exit 1
          fi
          echo "No GPL references in shipped package."

  test:
    name: Test (${{ matrix.os }} · Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyMICE (editable + extras)
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev,plot,pandas,ml,survival]"

      - name: Unit & integration tests (no R backend)
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/parity/test_rng_parity.py \
            -m "not r_backend"

      - name: Structural parity (V01–V08)
        run: python -m pytest tests/parity/test_structural_alignment.py -q

      - name: Vignette code-display audit
        run: python devtools/audit_code_display.py

      - name: Release checklist (structural + parity manifest + vignettes)
        run: |
          python -m pytest tests/parity/test_structural_alignment.py -q
          test -f reference/parity_manifest.json
          PYTHONPATH=devtools python -c "from lib.parity_manifest import build_manifest, load_manifest; assert load_manifest()==build_manifest()"
          test -f docs/vignettes/index.html

  r-smoke:
    name: R backend smoke (Ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2

      - name: Install CRAN mice + pan
        run: |
          Rscript -e 'install.packages(c("mice", "pan"), repos="https://cloud.r-project.org")'

      - name: Install PyMICE (editable + extras)
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev,plot,pandas,ml,survival]"

      - name: R RNG + mice(rng="r") smoke tests
        run: |
          python -m pytest \
            tests/unit/test_rng.py::test_r_rng_matches_r_runif_rnorm \
            tests/unit/test_rng.py::test_r_session_survives_sequential_mice_calls \
            tests/unit/test_r_prerequisite.py::test_ensure_r_prerequisites_without_install \
            -q

  build:
    name: Build wheel & sdist
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke-install wheel (Linux)
        run: python -m pip install dist/*.whl

      - name: Import check
        run: |
          python -c "import pymice; from pymice import load_nhanes; load_nhanes()"
          python -c "import importlib.metadata as m; print('pymice-fcs', m.version('pymice-fcs'))"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pymice-dist
          path: dist/*
          retention-days: 14

  install-smoke:
    name: Install wheel (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pymice-dist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from wheel (no source tree)
        run: python -m pip install --upgrade pip && python -m pip install dist/*.whl

      - name: Verify import & core API
        run: |
          python <<'PY'
          import pymice
          from pymice import mice, complete, load_nhanes
          data, names = load_nhanes()
          imp = mice(data, column_names=names, m=1, maxit=1, seed=1)
          complete(imp, 1)
          print("install-smoke ok")
          PY

  ci-success:
    name: CI gate
    if: always()
    needs: [lint, test, r-smoke, build, install-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require all verification jobs
        run: |
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.r-smoke.result }}" = "success"
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.install-smoke.result }}" = "success"